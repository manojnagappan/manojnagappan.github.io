<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Manoj Nagappan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0e0e0e;
  --paper: #f7f6f2;
  --mid: #c8c5bc;
  --muted: #8a8880;
  --border: rgba(0,0,0,0.07);
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.g-head {
  padding: 2.5rem 2rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--border);
}

.g-head-left { display: flex; flex-direction: column; gap: 0.3rem; }

.g-eyebrow {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.g-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2rem, 6vw, 3.6rem);
  line-height: 0.95;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.g-title em {
  font-style: italic;
}

.g-pexels-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 0.5rem 0.9rem;
  transition: background 0.2s, color 0.2s;
}

.g-pexels-link:hover {
  background: var(--ink);
  color: var(--paper);
}

.g-pexels-link svg {
  width: 12px;
  height: 12px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* ── STRIP COUNTER ── */
.g-strip {
  padding: 0.6rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.g-counter {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.g-dot {
  width: 3px;
  height: 3px;
  background: var(--mid);
  border-radius: 50%;
}

/* ── MASONRY ── */
.g-masonry {
  padding: 1.5rem 2rem 0;
  columns: 3;
  column-gap: 10px;
}

@media (max-width: 780px) { .g-masonry { columns: 2; } }
@media (max-width: 480px) { .g-masonry { columns: 1; padding: 1rem; } }

/* ── PHOTO ITEM ── */
.g-item {
  break-inside: avoid;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: #d6d3cd;
  opacity: 0;
  transform: translateY(20px);
  animation: rise 0.55s var(--ease) forwards;
}

@keyframes rise {
  to { opacity: 1; transform: translateY(0); }
}

.g-item img {
  width: 100%;
  display: block;
  filter: grayscale(100%) contrast(1.08) brightness(0.97);
  transition: filter 0.55s var(--ease), transform 0.6s var(--ease);
  transform-origin: center;
}

.g-item:hover img {
  filter: grayscale(0%) contrast(1) brightness(1);
  transform: scale(1.05);
}

/* dark vignette on hover */
.g-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, transparent 40%, rgba(0,0,0,0.5) 100%);
  opacity: 0;
  z-index: 1;
  transition: opacity 0.4s var(--ease);
}

.g-item:hover::before { opacity: 1; }

/* index number label */
.g-num {
  position: absolute;
  top: 10px;
  left: 12px;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0);
  z-index: 2;
  transition: color 0.3s 0.1s;
  font-family: 'DM Mono', monospace;
}

.g-item:hover .g-num { color: rgba(255,255,255,0.55); }

/* expand icon */
.g-expand {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border: 1px solid rgba(255,255,255,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.3s, transform 0.3s;
}

.g-item:hover .g-expand {
  opacity: 1;
  transform: scale(1);
}

.g-expand svg {
  width: 12px;
  height: 12px;
  stroke: rgba(255,255,255,0.8);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
}

/* ── FOOTER ── */
.g-footer {
  margin-top: 1.5rem;
  padding: 1.25rem 2rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.g-footer-note {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.g-more-link {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  text-decoration: none;
  position: relative;
}

.g-more-link::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100%;
  height: 1px;
  background: var(--ink);
  transform-origin: left;
  transition: transform 0.3s var(--ease);
}

.g-more-link:hover::after { transform: scaleX(0); transform-origin: right; }

/* ── LIGHTBOX ── */
.lb-wrap {
  position: fixed;
  inset: 0;
  background: rgba(8,8,8,0.95);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s var(--ease);
}

.lb-wrap.open {
  opacity: 1;
  pointer-events: all;
}

.lb-inner {
  position: relative;
  max-width: 90vw;
  max-height: 88vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lb-img {
  max-width: 90vw;
  max-height: 88vh;
  object-fit: contain;
  filter: grayscale(100%) contrast(1.06);
  transition: filter 0.6s var(--ease), transform 0.4s var(--ease);
  transform: scale(0.94);
  cursor: zoom-in;
}

.lb-wrap.open .lb-img {
  transform: scale(1);
}

.lb-img:hover {
  filter: grayscale(0%) contrast(1);
}

.lb-close {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  background: none;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.55);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.45rem 0.85rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.lb-close:hover {
  border-color: rgba(255,255,255,0.5);
  color: rgba(255,255,255,0.9);
}

.lb-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.45);
  font-size: 18px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, color 0.2s;
  font-family: 'DM Mono', monospace;
}

.lb-nav:hover {
  border-color: rgba(255,255,255,0.45);
  color: rgba(255,255,255,0.9);
}

.lb-prev { left: 1.5rem; }
.lb-next { right: 1.5rem; }

.lb-index {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.3);
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  white-space: nowrap;
}

/* keyboard hint */
.lb-hint {
  position: fixed;
  bottom: 1.8rem;
  right: 1.8rem;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.2);
  font-family: 'DM Mono', monospace;
}
</style>
</head>
<body>

  <span class="g-footer-note">© 2026 Manoj Nagappan · All rights reserved</span>
  <a class="g-more-link" href="https://www.pexels.com/@manoj-nagappan-2153754329/" target="_blank">
    See all photographs on Pexels ↗
  </a>

<!-- LIGHTBOX -->
<div class="lb-wrap" id="lb" onclick="handleLbClick(event)">
  <button class="lb-close" onclick="closeLb()">✕ close</button>
  <button class="lb-nav lb-prev" onclick="navLb(-1)" title="Previous">‹</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="">
  </div>
  <button class="lb-nav lb-next" onclick="navLb(1)" title="Next">›</button>
  <div class="lb-index" id="lb-index"></div>
  <div class="lb-hint">← → navigate · esc close</div>
</div>

<script>
const imgs = [
  'gallery/img1.jpg',
  'gallery/img2.jpg',
  'gallery/img3.jpg',
  'gallery/img4.jpg',
  'gallery/img5.jpg',
  'gallery/img6.jpg',
  'gallery/img7.jpg',
  'gallery/img8.jpg',
  'gallery/img9.jpg',
  'gallery/img10.jpg'
];

let cur = 0;

function openLb(i) {
  cur = i;
  const lb = document.getElementById('lb');
  const img = document.getElementById('lb-img');
  img.src = imgs[i];
  img.alt = 'Photograph ' + (i+1) + ' by Manoj Nagappan';
  document.getElementById('lb-index').textContent = 'No. ' + String(i+1).padStart(2,'0') + ' / ' + String(imgs.length).padStart(2,'0');
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('lb-img').src = ''; }, 350);
}

function navLb(dir) {
  cur = (cur + dir + imgs.length) % imgs.length;
  const img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.style.transform = 'scale(0.96) translateX(' + (dir > 0 ? '-' : '') + '20px)';
  setTimeout(() => {
    img.src = imgs[cur];
    img.alt = 'Photograph ' + (cur+1) + ' by Manoj Nagappan';
    document.getElementById('lb-index').textContent = 'No. ' + String(cur+1).padStart(2,'0') + ' / ' + String(imgs.length).padStart(2,'0');
    img.style.transition = 'none';
    img.style.opacity = '0';
    img.style.transform = 'scale(0.96) translateX(' + (dir > 0 ? '' : '-') + '20px)';
    requestAnimationFrame(() => {
      img.style.transition = 'opacity 0.35s ease, transform 0.4s ease, filter 0.6s ease';
      img.style.opacity = '1';
      img.style.transform = 'scale(1) translateX(0)';
    });
  }, 180);
}

function handleLbClick(e) {
  if (e.target === document.getElementById('lb')) closeLb();
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
});
</script>
